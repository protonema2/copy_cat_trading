services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: copycat
      POSTGRES_PASSWORD: copycat
      POSTGRES_DB: copycat_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copycat -d copycat_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://copycat:copycat@postgres:5432/copycat_trading
      COPY_TRADER_AUTO_REGISTER: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
